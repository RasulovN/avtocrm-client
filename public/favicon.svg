<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="zumexBg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3A3733"/>
      <stop offset="1" stop-color="#201F1C"/>
    </linearGradient>
    <linearGradient id="zumexGold" x1="256" y1="150" x2="256" y2="366" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E59A24"/>
      <stop offset="0.5" stop-color="#FFD968"/>
      <stop offset="1" stop-color="#C57C0D"/>
    </linearGradient>
    <filter id="zumexShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#zumexBg)"/>

  <g filter="url(#zumexShadow)">
    <!-- Z mark (top bar + diagonal + bottom bar as one ribbon) -->
    <path d="M150 156 L362 156 L362 212 L206 304 L362 304 L362 360 L150 360 L150 304 L306 212 L150 212 Z" fill="url(#zumexGold)"/>
    <!-- Folded-ribbon accent on the upper diagonal -->
    <path d="M306 212 L362 212 L270 266 L214 266 Z" fill="#7A4A08" fill-opacity="0.42"/>
  </g>
</svg>
